server {
    listen 4000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the entry point so deployments take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets can be cached aggressively (Vite fingerprints filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
