name: marketspace

networks:
  marketspace-net:
    driver: bridge

volumes:
  postgres-catalog-data:
  postgres-basket-data:
  postgres-order-data:
  postgres-merchant-data:
  postgres-user-data:
  postgres-payment-data:
  postgres-ai-data:
  rabbitmq-data:
  minio-data:
  ollama-data:
  pgadmin-data:

# ─── Infrastructure ────────────────────────────────────────────────────────────

services:

  # ── AI ──────────────────────────────────────────────────────────────────────

  ollama:
    build:
      context: .
      dockerfile: infra/ollama/Dockerfile
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MINSTABILITY: "1"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 2G

  postgres-ai:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: AiDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres-ai-data:/var/lib/postgresql/data
      - ./infra/ollama/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AiDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-catalog:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: CatalogDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d CatalogDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-basket:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: BasketDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-basket-data:/var/lib/postgresql/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BasketDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-order:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: OrderDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d OrderDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-merchant:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: MerchantDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-merchant-data:/var/lib/postgresql/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MerchantDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-user:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: UserDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d UserDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-payment:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: PaymentDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PaymentDb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - marketspace-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@marketspace.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGPASSFILE: /pgpassfile
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infra/pgadmin/pgpassfile:/pgpassfile:ro
    networks:
      - marketspace-net
    depends_on:
      postgres-catalog:
        condition: service_healthy
      postgres-basket:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
      postgres-merchant:
        condition: service_healthy
      postgres-user:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
      postgres-ai:
        condition: service_healthy
    restart: unless-stopped

# ─── Microservices ─────────────────────────────────────────────────────────────
# App config (connection strings, service URLs, observability) lives in
# appsettings.Docker.json — no env vars needed for .NET services.

  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/Catalog.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6000:8080"
    depends_on:
      postgres-catalog:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped

  basket-api:
    build:
      context: .
      dockerfile: src/Services/Basket/Basket.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6001:8080"
    depends_on:
      postgres-basket:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped

  order-api:
    build:
      context: .
      dockerfile: src/Services/Order/Order.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6003:8080"
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped

  merchant-api:
    build:
      context: .
      dockerfile: src/Services/Merchant/Merchant.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6005:8080"
    depends_on:
      postgres-merchant:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped

  user-api:
    build:
      context: .
      dockerfile: src/Services/User/User.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6006:8080"
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped

  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/Payment.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6007:8080"
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped

  ai-api:
    build:
      context: .
      dockerfile: src/Services/Ai/Ai.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "6008:8080"
    depends_on:
      postgres-ai:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - marketspace-net
    restart: unless-stopped
# ─── BFF (Backend For Frontend) ────────────────────────────────────────────────

  backendforfrontend-api:
    build:
      context: .
      dockerfile: src/Edges/BackendForFrontend.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "5100:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      catalog-api:
        condition: service_started
      basket-api:
        condition: service_started
      order-api:
        condition: service_started
      merchant-api:
        condition: service_started
      user-api:
        condition: service_started
      payment-api:
        condition: service_started
      ai-api:
        condition: service_started
    networks:
      - marketspace-net
    restart: unless-stopped

# ─── Frontend ──────────────────────────────────────────────────────────────────

  webapp:
    build:
      context: ui/marketspace-ui
      dockerfile: Dockerfile
      args:
        VITE_BFF_API_URL: http://localhost:5100
        VITE_ENV: docker
    ports:
      - "80:4000"
    depends_on:
      - backendforfrontend-api
    networks:
      - marketspace-net
    restart: unless-stopped
